name: "Frogbot PR Scan"
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  frogbot-scan:
    runs-on: ubuntu-latest
    environment: frogbot
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This ensures we scan the code FROM the PR
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Frogbot
        uses: jfrog/frogbot@v2
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          
          # FIX: Replace secrets.JF_GIT_TOKEN with secrets.GITHUB_TOKEN
          # You do NOT need to create this secret; GitHub provides it automatically.
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          JF_WORKING_DIR: "npm-example"
          JF_WATCHES: "sss-servicenow"
          JF_GIT_BASE_BRANCH: ${{ github.base_ref }}
          
          JFROG_CLI_LOG_LEVEL: DEBUG
          JF_INCLUDE_ALL_VULNERABILITIES: "TRUE"
          JF_FAIL: "FALSE"
